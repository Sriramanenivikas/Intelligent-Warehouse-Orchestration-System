_format_version: "3.0"

plugins:
  - name: correlation-id
    config:
      header_name: x-request-id
      generator: uuid

consumers:
  - username: iwos-edge-client
    jwt_secrets:
      - key: http://localhost:8092
        algorithm: RS256
        rsa_public_key: |
          -----BEGIN PUBLIC KEY-----
          MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAoJG/1mwK0vq64oV9PnA+
          v02IBPnyhJo4ASLGoh3cP5RhLEelnS6SSe6YI3G2tEauNjfERlfbCndSee6tbSWk
          glMmQ+T9qEgd4cS5mRrXMtkCubGbxiN3uUwHIVnmXP9OfJiuMcq98FapkVyIZz0H
          Y6onbvu2U4Vnxlod1NW0FvCF3CQtLWmjqLG47mJoYhvTco/NKle9ej/GiOKBno7e
          7fR3uZsFEoIrlCIiCdjdN14HORryamH47lEzvizvZZ3plpOOt1X3Sfkb83gGx7ux
          iSMS1An3SCCIeHkGILs7vsxn1OsVr93XVwOtZEu5fEVVwMt1SjRfcurhjFuoAgEe
          NQIDAQAB
          -----END PUBLIC KEY-----

services:
  - name: identity-service
    url: http://host.docker.internal:8092
    routes:
      - name: identity-auth-route
        paths:
          - /api/v1/auth/token
        strip_path: false

  - name: order-intake-service
    url: http://host.docker.internal:8081
    routes:
      - name: order-intake-route
        paths:
          - /api/v1/order-intents
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 300
          policy: local

  - name: warehouse-orchestrator-service
    url: http://host.docker.internal:8086
    routes:
      - name: warehouse-orchestrator-route
        paths:
          - /api/v1/fulfillment-orders
        strip_path: false
    plugins:
      - name: jwt
        config:
          claims_to_verify:
            - exp
          key_claim_name: iss
      - name: rate-limiting
        config:
          minute: 300
          policy: local

  - name: order-orchestrator-service
    url: http://host.docker.internal:8083
    routes:
      - name: order-orchestrator-route
