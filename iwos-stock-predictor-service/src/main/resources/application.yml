server:
  port: 8091
spring:
  application:
    name: iwos-stock-predictor-service
aws:
  sagemaker:
    endpoint: ${SAGEMAKER_ENDPOINT:}
    region: ${AWS_REGION:ap-south-1}
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
