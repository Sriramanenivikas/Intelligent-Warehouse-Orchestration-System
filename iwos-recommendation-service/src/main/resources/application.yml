server:
  port: 8092
spring:
  application:
    name: iwos-recommendation-service
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/iwos_recommendations}
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
