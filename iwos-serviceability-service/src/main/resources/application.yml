server:
  port: 8102
spring:
  application:
    name: iwos-serviceability-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/iwos_serviceability
    username: ${DB_USERNAME:iwos}
    password: ${DB_PASSWORD:iwos_secret}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
