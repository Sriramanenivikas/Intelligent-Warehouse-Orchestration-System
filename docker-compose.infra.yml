version: "3.9"

services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: iwos-prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:11.3.0
    container_name: iwos-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: iwos_admin
    ports:
      - "3000:3000"

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: iwos-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
