server:
  port: 8089
spring:
  application:
    name: iwos-route-optimizer-service
google:
  maps:
    api-key: ${GOOGLE_MAPS_API_KEY:}
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
