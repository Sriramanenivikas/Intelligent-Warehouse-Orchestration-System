server:
  port: 8888

spring:
  application:
    name: iwos-config-server
  cloud:
    config:
      server:
        git:
          uri: ${CONFIG_REPO_URI:https://github.com/iwos/config-repo}
          default-label: main
          clone-on-start: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
