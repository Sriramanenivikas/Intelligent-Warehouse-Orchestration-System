server:
  port: 8084
spring:
  application:
    name: iwos-payment-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/iwos_payments
    username: ${DB_USERNAME:iwos}
    password: ${DB_PASSWORD:iwos_secret}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

razorpay:
  key-id: ${RAZORPAY_KEY_ID:}
  key-secret: ${RAZORPAY_KEY_SECRET:}

stripe:
  api-key: ${STRIPE_API_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
