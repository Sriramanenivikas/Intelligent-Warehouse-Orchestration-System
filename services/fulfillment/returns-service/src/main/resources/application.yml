spring:
  application:
    name: returns-service
  datasource:
    url: ${RETURNS_DB_URL:jdbc:postgresql://localhost:55432/iwos}
    username: ${RETURNS_DB_USERNAME:iwos}
    password: ${RETURNS_DB_PASSWORD:iwos_secret}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: returns_management
    open-in-view: false
  flyway:
    enabled: true
    schemas: returns_management
    default-schema: returns_management
    table: returns_management_flyway_schema_history
    locations: classpath:db/migration

server:
  port: 8096
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      service: returns-service
      env: ${APP_ENV:local}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
