openapi: 3.0.3
info:
  title: Warehouse Orchestrator API
  version: 1.0.0
paths:
  /api/v1/fulfillment-orders/{fulfillmentOrderId}:
    get:
      summary: Get fulfillment order by fulfillment order id
      parameters:
        - in: path
          name: fulfillmentOrderId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Fulfillment order found
        '404':
          description: Fulfillment order not found
  /api/v1/fulfillment-orders/by-workflow/{workflowId}:
    get:
      summary: Get fulfillment order by workflow id
      parameters:
        - in: path
          name: workflowId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Fulfillment order found
        '404':
          description: Fulfillment order not found
  /api/v1/fulfillment-orders:
    get:
      summary: List fulfillment orders
      parameters:
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum:
              - TASKS_CREATED
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        '200':
          description: Fulfillment orders
