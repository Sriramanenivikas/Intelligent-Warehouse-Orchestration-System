asyncapi: 2.6.0
info:
  title: Warehouse Orchestrator Events
  version: 1.0.0
channels:
  iwos.order-orchestrator.events.v1:
    subscribe:
      summary: Consumes payment-authorized order workflow events
      message:
        name: order-orchestrator.payment-authorized.v1
        payload:
          type: object
          properties:
            workflowId:
              type: string
              format: uuid
            orderIntentId:
              type: string
              format: uuid
            paymentIntentId:
              type: string
              format: uuid
            occurredAt:
              type: string
              format: date-time
  iwos.warehouse-orchestrator.events.v1:
    publish:
      summary: Publishes warehouse fulfillment order-created events
      message:
        name: warehouse.fulfillment.order-created.v1
        payload:
          type: object
          properties:
            fulfillmentOrderId:
              type: string
              format: uuid
            workflowId:
              type: string
              format: uuid
            orderIntentId:
              type: string
              format: uuid
            paymentIntentId:
              type: string
              format: uuid
            fulfillmentNodeId:
              type: string
            warehouseCode:
              type: string
            sourceTopic:
              type: string
            sourceMessageKey:
              type: string
            sourceEventOccurredAt:
              type: string
              format: date-time
            items:
              type: array
              items:
                type: object
                properties:
                  orderIntentItemId:
                    type: string
                    format: uuid
                  inventoryReservationId:
                    type: string
                    format: uuid
                  nodeId:
                    type: string
                  sku:
                    type: string
                  quantity:
                    type: integer
                  reservationStatus:
                    type: string
