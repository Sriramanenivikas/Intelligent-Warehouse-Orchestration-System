server:
  port: 8087
  shutdown: graceful

spring:
  application:
    name: task-execution-service

  datasource:
    url: jdbc:postgresql://localhost:55432/iwos
    username: iwos
    password: iwos_secret
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: task_execution
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: task_execution
    table: flyway_schema_history
    baseline-on-migrate: false

  data:
    redis:
      host: localhost
      port: 56379
      password: iwos_secret
      timeout: 5000ms

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  metrics:
    tags:
      service: task-execution-service
      env: ${ENVIRONMENT:local}

task-execution-service:
  service-name: task-execution-service
  kafka:
    consumer-topic: iwos.warehouse-orchestrator.events.v1
    producer-topic: iwos.task-execution.events.v1
    group-id: task-execution-service-consumer
  warehouse:
    base-url: http://localhost:8086
  inventory:
    base-url: http://localhost:8082
  outbox:
    poll-interval-ms: 1000

logging:
  level:
    root: INFO
    com.iwos.taskexecution: DEBUG
    org.springframework.kafka: WARN
    org.apache.kafka: WARN
