spring:
  application:
    name: node-registry-service
  datasource:
    url: ${NODE_REGISTRY_DB_URL:jdbc:postgresql://localhost:55432/iwos}
    username: ${NODE_REGISTRY_DB_USERNAME:iwos}
    password: ${NODE_REGISTRY_DB_PASSWORD:iwos_secret}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: node_registry
    open-in-view: false
  flyway:
    enabled: true
    schemas: node_registry
    default-schema: node_registry
    table: node_registry_flyway_schema_history
    locations: classpath:db/migration

server:
  port: 8095
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      service: node-registry-service
      env: ${APP_ENV:local}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
