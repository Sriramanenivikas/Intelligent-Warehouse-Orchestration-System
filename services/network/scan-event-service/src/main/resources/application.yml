server:
  port: 8090
  shutdown: graceful

spring:
  application:
    name: scan-event-service
  datasource:
    url: ${SCAN_EVENT_DB_URL:jdbc:postgresql://localhost:55432/iwos}
    username: ${SCAN_EVENT_DB_USERNAME:iwos}
    password: ${SCAN_EVENT_DB_PASSWORD:iwos_secret}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: scan_event
    open-in-view: false
  flyway:
    enabled: true
    schemas: scan_event
    default-schema: scan_event
    table: scan_event_flyway_schema_history
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${SCAN_EVENT_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      service: scan-event-service
      env: ${APP_ENV:local}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

scan-event-service:
  service-name: scan-event-service
  kafka:
    consumer-topic: ${SCAN_EVENT_CONSUMER_TOPIC:iwos.shipment-network.events.v1}
    producer-topic: ${SCAN_EVENT_PRODUCER_TOPIC:iwos.scan.events.v1}
    group-id: ${SCAN_EVENT_CONSUMER_GROUP:scan-event-service-consumer}
  outbox:
    poll-interval-ms: ${SCAN_EVENT_OUTBOX_POLL_INTERVAL_MS:1000}
