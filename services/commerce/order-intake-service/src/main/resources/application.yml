spring:
  application:
    name: order-intake-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${ORDER_INTAKE_DB_URL:jdbc:postgresql://localhost:55432/iwos}
    username: ${ORDER_INTAKE_DB_USERNAME:iwos}
    password: ${ORDER_INTAKE_DB_PASSWORD:iwos_secret}
  data:
    redis:
      host: ${ORDER_INTAKE_REDIS_HOST:localhost}
      port: ${ORDER_INTAKE_REDIS_PORT:56379}
      password: ${ORDER_INTAKE_REDIS_PASSWORD:iwos_secret}
      timeout: 2s
      repositories:
        enabled: false
  kafka:
    bootstrap-servers: ${ORDER_INTAKE_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    template:
      observation-enabled: true
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
  flyway:
    enabled: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

server:
  port: ${ORDER_INTAKE_SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      service: ${spring.application.name}
      env: ${SPRING_PROFILES_ACTIVE:local}
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true
          client:
            requests: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${ORDER_INTAKE_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  file:
    name: ${ORDER_INTAKE_LOG_FILE:logs/order-intake-service.log}

iwos:
  order-intake:
    idempotency-cache-ttl: PT24H
    outbox:
      topic: iwos.order-intake.accepted.v1
      poll-interval: PT5S
      batch-size: 50
