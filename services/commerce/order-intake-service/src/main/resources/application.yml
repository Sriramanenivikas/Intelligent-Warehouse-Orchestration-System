spring:
  application:
    name: order-intake-service
  datasource:
    url: ${ORDER_INTAKE_DB_URL:jdbc:postgresql://localhost:5432/iwos}
    username: ${ORDER_INTAKE_DB_USERNAME:iwos}
    password: ${ORDER_INTAKE_DB_PASSWORD:iwos_secret}
  data:
    redis:
      host: ${ORDER_INTAKE_REDIS_HOST:localhost}
      port: ${ORDER_INTAKE_REDIS_PORT:6379}
      password: ${ORDER_INTAKE_REDIS_PASSWORD:iwos_secret}
      timeout: 2s
      repositories:
        enabled: false
  flyway:
    enabled: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

server:
  port: ${ORDER_INTAKE_SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${ORDER_INTAKE_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  file:
    name: ${ORDER_INTAKE_LOG_FILE:logs/order-intake-service.log}

iwos:
  order-intake:
    idempotency-cache-ttl: PT24H
