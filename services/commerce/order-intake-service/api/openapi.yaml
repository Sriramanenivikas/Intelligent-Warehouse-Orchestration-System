openapi: 3.1.0
info:
  title: Order Intake Service API
  version: 1.0.0
  description: Fast order acceptance and idempotency boundary for order placement.
servers:
  - url: http://localhost:8081
paths:
  /api/v1/order-intents:
    post:
      operationId: createOrderIntent
      summary: Accept a new order intent
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderIntentRequest'
      responses:
        '202':
          description: Order intent accepted
          headers:
            Idempotency-Replayed:
              schema:
                type: boolean
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderIntentResponse'
        '400':
          description: Validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Idempotency key reused with a different payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/order-intents/{orderIntentId}:
    get:
      operationId: getOrderIntent
      summary: Fetch an accepted order intent
      parameters:
        - in: path
          name: orderIntentId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Order intent found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderIntentResponse'
        '404':
          description: Order intent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
components:
  schemas:
    CreateOrderIntentRequest:
      type: object
      required: [customerId, channel, paymentMode, currency, deliveryAddress, items]
      properties:
        customerId:
          type: string
        channel:
          type: string
          enum: [APP, WEB, PARTNER]
        paymentMode:
          type: string
          enum: [PREPAID, COD]
        currency:
          type: string
          minLength: 3
          maxLength: 3
        deliveryAddress:
          $ref: '#/components/schemas/Address'
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OrderItem'
    Address:
      type: object
      required: [name, line1, city, state, postalCode, country, phone]
      properties:
        name:
          type: string
        line1:
          type: string
        line2:
          type: string
        city:
          type: string
        state:
          type: string
        postalCode:
          type: string
        country:
          type: string
        phone:
          type: string
    OrderItem:
      type: object
      required: [sku, quantity]
      properties:
        sku:
          type: string
        quantity:
          type: integer
          minimum: 1
    OrderIntentResponse:
      type: object
      required: [orderIntentId, customerId, channel, paymentMode, currency, status, acceptedAt, deliveryAddress, items]
      properties:
        orderIntentId:
          type: string
          format: uuid
        customerId:
          type: string
        channel:
          type: string
        paymentMode:
          type: string
        currency:
          type: string
        status:
          type: string
        acceptedAt:
          type: string
          format: date-time
        deliveryAddress:
          $ref: '#/components/schemas/Address'
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
    ApiError:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        requestId:
          type: string
        timestamp:
          type: string
          format: date-time
        fieldErrors:
          type: object
          additionalProperties:
            type: string
