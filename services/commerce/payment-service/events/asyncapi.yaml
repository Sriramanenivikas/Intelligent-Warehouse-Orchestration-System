asyncapi: 3.0.0
info:
  title: payment-service events
  version: 1.0.0
defaultContentType: application/json
channels:
  iwos.payment.events.v1:
    address: iwos.payment.events.v1
    messages:
      paymentAuthorized:
        $ref: '#/components/messages/PaymentAuthorized'
      paymentSucceeded:
        $ref: '#/components/messages/PaymentSucceeded'
      paymentFailed:
        $ref: '#/components/messages/PaymentFailed'
components:
  messages:
    PaymentAuthorized:
      name: payment.intent-authorized.v1
      payload:
        type: object
        required:
          - eventId
          - paymentIntentId
          - orderIntentId
          - orderWorkflowId
          - status
          - occurredAt
        properties:
          eventId:
            type: string
            format: uuid
          paymentIntentId:
            type: string
            format: uuid
          orderIntentId:
            type: string
            format: uuid
          orderWorkflowId:
            type: string
            format: uuid
          status:
            type: string
          occurredAt:
            type: string
            format: date-time
    PaymentSucceeded:
      name: payment.intent-succeeded.v1
      payload:
        type: object
        required:
          - eventId
          - paymentIntentId
          - orderIntentId
          - orderWorkflowId
          - status
          - occurredAt
        properties:
          eventId:
            type: string
            format: uuid
          paymentIntentId:
            type: string
            format: uuid
          orderIntentId:
            type: string
            format: uuid
          orderWorkflowId:
            type: string
            format: uuid
          status:
            type: string
          occurredAt:
            type: string
            format: date-time
    PaymentFailed:
      name: payment.intent-failed.v1
      payload:
        type: object
        required:
          - eventId
          - paymentIntentId
          - orderIntentId
          - orderWorkflowId
          - status
          - occurredAt
        properties:
          eventId:
            type: string
            format: uuid
          paymentIntentId:
            type: string
            format: uuid
          orderIntentId:
            type: string
            format: uuid
          orderWorkflowId:
            type: string
            format: uuid
          status:
            type: string
          occurredAt:
            type: string
            format: date-time
