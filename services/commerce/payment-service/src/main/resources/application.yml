spring:
  application:
    name: payment-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${PAYMENT_DB_URL:jdbc:postgresql://localhost:55432/iwos}
    username: ${PAYMENT_DB_USERNAME:iwos}
    password: ${PAYMENT_DB_PASSWORD:iwos_secret}
  data:
    redis:
      host: ${PAYMENT_REDIS_HOST:localhost}
      port: ${PAYMENT_REDIS_PORT:56379}
      password: ${PAYMENT_REDIS_PASSWORD:iwos_secret}
      timeout: 2s
      repositories:
        enabled: false
  kafka:
    bootstrap-servers: ${PAYMENT_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    template:
      observation-enabled: true
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
  flyway:
    enabled: true
    table: payment_flyway_schema_history
    default-schema: payment
    schemas: payment
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: payment
        jdbc:
          time_zone: UTC

server:
  port: ${PAYMENT_SERVER_PORT:8085}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      service: ${spring.application.name}
      env: ${SPRING_PROFILES_ACTIVE:local}
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true
          client:
            requests: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${PAYMENT_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  file:
    name: ${PAYMENT_LOG_FILE:logs/payment-service.log}

iwos:
  payment:
    idempotency-cache-ttl: PT24H
    authorization-limit: 5000.00
    outbox:
      topic: iwos.payment.events.v1
      poll-interval: PT5S
      batch-size: 50
    provider-name: LOCAL_SIMULATED_GATEWAY
