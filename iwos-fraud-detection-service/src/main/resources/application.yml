server:
  port: 8094
spring:
  application:
    name: iwos-fraud-detection-service
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
