global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'iwos-production'
    env: 'load-test'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Load rules once and periodically evaluate them
rule_files:
  - "alerts/*.yml"

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Kong API Gateway metrics
  - job_name: 'kong'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['kong:8001']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'kong-gateway'

  # Order Service (Spring Boot Actuator)
  - job_name: 'order-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['order-service:8083']
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: 'order-service'

  # Inventory Service
  - job_name: 'inventory-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['inventory-service:8082']
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: 'inventory-service'

  # Warehouse Service
  - job_name: 'warehouse-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['warehouse-service:8084']
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: 'warehouse-service'

  # Auth Service
  - job_name: 'auth-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['auth-service:8081']
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: 'auth-service'

  # Order Generator (Load Test Service)
  - job_name: 'order-generator'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['order-generator:9001']
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: 'order-generator'

  # PostgreSQL Exporter (Write Database)
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
    relabel_configs:
      - source_labels: [__address__]
        target_label: database
        replacement: 'postgresql-write'

  # MongoDB Exporter (Read Database - CQRS)
  - job_name: 'mongodb-exporter'
    static_configs:
      - targets: ['mongodb-exporter:9216']
    relabel_configs:
      - source_labels: [__address__]
        target_label: database
        replacement: 'mongodb-read'

  # Redis Exporter (Kong rate limiting & caching)
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']
    relabel_configs:
      - source_labels: [__address__]
        target_label: cache
        replacement: 'redis'

  # Kafka JMX Exporter (Event Streaming)
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka-1:9999', 'kafka-2:9999', 'kafka-3:9999']
    relabel_configs:
      - source_labels: [__address__]
        target_label: broker
        regex: 'kafka-(.+):9999'
        replacement: 'kafka-broker-$1'

  # Zookeeper JMX Exporter
  - job_name: 'zookeeper'
    static_configs:
      - targets: ['zookeeper:9998']

  # Node Exporter (System metrics)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # Jaeger (Distributed Tracing metrics)
  - job_name: 'jaeger'
    static_configs:
      - targets: ['jaeger:14269']

  # Elasticsearch (ELK Stack)
  - job_name: 'elasticsearch'
    metrics_path: '/_prometheus/metrics'
    static_configs:
      - targets: ['elasticsearch:9200']
