groups:
  - name: iwos-platform-health
    rules:
      - alert: PrometheusTargetDown
        expr: up == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Prometheus target down"
          description: "A scrape target has been down for more than 2 minutes."

      - alert: OTelCollectorUnavailable
        expr: up{job="otel-collector"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "OTel Collector unavailable"
          description: "The telemetry intake layer is not reachable."

      - alert: AlloyUnavailable
        expr: up{job="alloy"} == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Alloy unavailable"
          description: "The local log shipping agent is not reachable."

      - alert: BlackboxProbeFailed
        expr: probe_success{job="blackbox-http"} == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "HTTP probe failed"
          description: "A platform endpoint is not returning a successful HTTP probe."

      - alert: NoServiceTargetsRegistered
        expr: absent(up{job="local-services"})
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "No application scrape targets registered"
          description: "No future service metrics endpoints have been added to Prometheus file discovery."

      - alert: LocalServiceDown
        expr: up{job="local-services"} == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Local service down"
          description: "The local service {{ $labels.service_name }} is not reachable on its Prometheus endpoint."

      - alert: OrderIntakeOutboxBacklog
        expr: iwos_order_intake_outbox_pending > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Order intake outbox backlog"
          description: "Order intake still has pending outbox events after 10 minutes."

      - alert: OrderWorkflowOutboxBacklog
        expr: iwos_order_workflow_outbox_pending > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Order workflow outbox backlog"
          description: "Order orchestrator still has pending outbox events after 10 minutes."

      - alert: InventoryOutboxBacklog
        expr: iwos_inventory_outbox_pending > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Inventory outbox backlog"
          description: "Inventory ledger still has pending outbox events after 10 minutes."
