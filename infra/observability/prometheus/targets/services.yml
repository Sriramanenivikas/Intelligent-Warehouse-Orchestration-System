# Register host-running services here once they expose /actuator/prometheus.
# On macOS Docker Desktop, Prometheus reaches your host via host.docker.internal.
#
# Example:
# - labels:
#     job: local-services
#     service_name: order-intake-service
#   targets:
#     - host.docker.internal:8081
- labels:
    job: local-services
    service_name: order-intake-service
  targets:
    - host.docker.internal:8081

- labels:
    job: local-services
    service_name: inventory-ledger-service
  targets:
    - host.docker.internal:8082

- labels:
    job: local-services
    service_name: order-orchestrator-service
  targets:
    - host.docker.internal:8083
