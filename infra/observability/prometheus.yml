global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'iwos-services'
    metrics_path: '/actuator/prometheus'
    eureka_sd_configs:
      - server: http://iwos-discovery-server:8761/eureka
    relabel_configs:
      - source_labels: [__meta_eureka_app_name]
        target_label: application
