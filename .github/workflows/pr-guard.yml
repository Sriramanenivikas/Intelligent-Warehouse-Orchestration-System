name: PR Guard

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  title:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "$PR_TITLE" | grep -E '^(feat|fix|docs|chore|refactor|test|build|ci|perf|revert)(\([a-z0-9-]+\))?: .+' >/dev/null

  branch-name:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Validate source branch name
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          echo "$HEAD_REF" | grep -E '^(feat|fix|docs|chore|refactor|test|ci|perf|release|hotfix)\/[a-z0-9._-]+$' >/dev/null
