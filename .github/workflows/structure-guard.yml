name: Structure Guard

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: structure-guard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: test -d services/commerce
      - run: test -d services/fulfillment
      - run: test -d services/network
      - run: test -d services/intelligence
      - run: test -d platform/kong
