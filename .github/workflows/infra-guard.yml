name: Infra Guard

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: infra-guard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  infra-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: test -f infra/observability/prometheus.yml
      - run: test -f deploy/helm/service-template/templates/_helpers.tpl
      - run: test -f platform/kong/gateway-api/base/gateway.yaml
