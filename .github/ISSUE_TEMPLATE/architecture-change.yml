name: Architecture change
description: Propose a service-boundary, deployment, or platform decision change.
title: "docs(architecture): "
labels:
  - architecture
  - triage
body:
  - type: textarea
    id: current-state
    attributes:
      label: Current state
      description: What are we doing today?
    validations:
      required: true
  - type: textarea
    id: proposed-state
    attributes:
      label: Proposed state
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: tradeoffs
    attributes:
      label: Tradeoffs
      description: What gets better and what gets worse?
    validations:
      required: true
