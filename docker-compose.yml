version: '3.8'

services:
  # ========================================
  # PostgreSQL Database
  # ========================================
  postgres:
    image: postgres:15-alpine
    container_name: iwos-postgres
    environment:
      POSTGRES_DB: iwos_db
      POSTGRES_USER: iwos_user
      POSTGRES_PASSWORD: iwos_password
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iwos_user -d iwos_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iwos-network

  # ========================================
  # Redis Cache
  # ========================================
  redis:
    image: redis:7-alpine
    container_name: iwos-redis
    command: redis-server --requirepass iwos_redis_password
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "iwos_redis_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iwos-network

  # ========================================
  # Zookeeper (Required by Kafka)
  # ========================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: iwos-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    networks:
      - iwos-network

  # ========================================
  # Kafka Message Broker
  # ========================================
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: iwos-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # Listeners
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # Topic Config
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DELETE_TOPIC_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1

      # Performance
      KAFKA_LOG_RETENTION_HOURS: 168  # 7 days
      KAFKA_LOG_SEGMENT_BYTES: 1073741824  # 1GB
      KAFKA_MESSAGE_MAX_BYTES: 10485760  # 10MB

      # Logging
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - iwos-network

  # ========================================
  # Kafka UI (Optional - for debugging)
  # ========================================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: iwos-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: iwos-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - iwos-network

  # ========================================
  # IWOS MICROSERVICES
  # ========================================

  # Auth Service - JWT Authentication
  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile
    container_name: iwos-auth-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/iwos_db
      SPRING_DATASOURCE_USERNAME: iwos_user
      SPRING_DATASOURCE_PASSWORD: iwos_password
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PASSWORD: iwos_redis_password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET:-iwos-super-secret-jwt-key-change-in-production-2024}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - iwos-network
    restart: unless-stopped

  # Inventory Service - Stock Management
  inventory-service:
    build:
      context: ./backend/inventory-service
      dockerfile: Dockerfile
    container_name: iwos-inventory-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/iwos_db
      SPRING_DATASOURCE_USERNAME: iwos_user
      SPRING_DATASOURCE_PASSWORD: iwos_password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - iwos-network
    restart: unless-stopped

  # Order Service - CQRS + Event Sourcing
  order-service:
    build:
      context: ./backend/order-service
      dockerfile: Dockerfile
    container_name: iwos-order-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/iwos_db
      SPRING_DATASOURCE_USERNAME: iwos_user
      SPRING_DATASOURCE_PASSWORD: iwos_password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      WAREHOUSE_SERVICE_URL: http://warehouse-service:8084
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      warehouse-service:
        condition: service_started
    networks:
      - iwos-network
    restart: unless-stopped

  # Warehouse Service - Geospatial Allocation
  warehouse-service:
    build:
      context: ./backend/warehouse-service
      dockerfile: Dockerfile
    container_name: iwos-warehouse-service
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/iwos_db
      SPRING_DATASOURCE_USERNAME: iwos_user
      SPRING_DATASOURCE_PASSWORD: iwos_password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - iwos-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  zookeeper_data:
    driver: local
  zookeeper_logs:
    driver: local
  kafka_data:
    driver: local

networks:
  iwos-network:
    driver: bridge
